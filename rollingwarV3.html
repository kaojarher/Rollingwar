<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 動畫/Emoji 完美容錯地下城 ⚔️</title>
    <style>
        :root {
            --bg-color: #0d0d10;
            --panel-color: #1a1a22;
            --text-color: #f0f0f0;
            --accent-color: #ffcc00;
            --cell-bg: #23232e;
            
            /* 圖片路徑：若同路徑下找不到此檔案，會自動切換為備援 Emoji */
            --spritesheet-url: url('image_0.png');
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; overflow: hidden; }

        .game-container {
            width: 100%;
            max-width: 460px;
            background-color: var(--panel-color);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }

        h1 { text-align: center; font-size: 1.4rem; color: var(--accent-color); letter-spacing: 2px; }

        .status-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .grid-container {
            background: #050507;
            border: 3px solid #444;
            border-radius: 14px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            aspect-ratio: 1 / 1;
            grid-column: 2;
            grid-row: 2;
        }

        /* 直排／橫列洗牌按鈕外框：與 grid-container 的 5x5 網格對齊 */
        .board-wrapper {
            display: grid;
            grid-template-columns: 32px 1fr;
            grid-template-rows: 32px 1fr;
            gap: 6px;
        }
        .board-corner {
            grid-column: 1; grid-row: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; opacity: 0.6;
        }
        .col-buttons {
            grid-column: 2; grid-row: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 0 8px;
        }
        .row-buttons {
            grid-column: 1; grid-row: 2;
            display: grid;
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            padding: 8px 0;
        }
        .line-btn {
            background: linear-gradient(135deg, #2a2a35, #1a1a22);
            border: 1px solid #444;
            border-radius: 6px;
            color: var(--accent-color);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            padding: 0;
        }
        .line-btn:hover:not(:disabled) { background: #35353f; transform: scale(1.08); border-color: var(--accent-color); }
        .line-btn:active:not(:disabled) { transform: scale(0.94); }
        .line-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .cell {
            background: var(--cell-bg);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 戰鬥動畫容器 */
        .unit-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* 備援層：底層 Emoji (圖片讀取失敗時會露出來) */
        .unit-emoji {
            font-size: 2rem;
            position: absolute;
            z-index: 1;
            pointer-events: none;
        }

        /* 核心層：上層圖片 (讀取成功時會蓋住 Emoji) */
        .unit-visual {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background-image: var(--spritesheet-url);
            /* 圖檔實際為 7 欄 × 5 列，故 size = 700% 500%（單格） */
            background-size: 700% 500%; 
            background-repeat: no-repeat;
            z-index: 2; /* 確保在 Emoji 之上 */
            pointer-events: none;
        }

        /* 🛠️ CSS 精靈圖位置映射
           圖檔實際格線為 7 欄 × 5 列（非原本假設的 5 欄 × 6 列）。
           單格座標公式： x = 欄index/(7-1)*100%， y = 列index/(5-1)*100%
           第 0 列＝英雄角色列，第 1 列＝怪物角色列（挑選 7 欄中有代表性的 5 欄） */
        .type-H0 .unit-visual { background-position: 0%      0%; }   /* 第0欄 魔法使い */
        .type-H1 .unit-visual { background-position: 16.667% 0%; }   /* 第1欄 ワラロ */
        .type-H2 .unit-visual { background-position: 33.333% 0%; }   /* 第2欄 オーバー */
        .type-H3 .unit-visual { background-position: 66.667% 0%; }   /* 第4欄 バラダン */
        .type-H4 .unit-visual { background-position: 100%    0%; }   /* 第6欄 癒し屋 */

        .type-M0 .unit-visual { background-position: 0%      25%; } /* 第0欄 オガ */
        .type-M1 .unit-visual { background-position: 16.667% 25%; } /* 第1欄 スキタロ */
        .type-M2 .unit-visual { background-position: 33.333% 25%; } /* 第2欄 ドラゴン */
        .type-M3 .unit-visual { background-position: 66.667% 25%; } /* 第4欄 グースト */
        .type-M4 .unit-visual { background-position: 83.333% 25%; } /* 第5欄 ゴラトン */

        /* 巨大單位映射：第5列（index 4）裡只有「英雄合體」與「怪物合體」兩張橫跨2欄的合圖，
           並非每種角色各自獨立一張，因此所有 LH/LM 變體統一指向同一張合圖，
           並用「切片公式」把 2欄寬的圖精準縮放對齊到單一格子內：
           size = (總欄數/切片欄數)*100% ， position = 切片起始欄/(總欄數-切片欄數)*100% */
        .type-LH0 .unit-visual,
        .type-LH1 .unit-visual,
        .type-LH2 .unit-visual,
        .type-LH3 .unit-visual,
        .type-LH4 .unit-visual {
            background-size: 350% 500%;   /* 7/2 欄, 5列 */
            background-position: 0% 100%; /* 起始於第0欄，第4列 */
        }

        .type-LM0 .unit-visual,
        .type-LM1 .unit-visual,
        .type-LM2 .unit-visual,
        .type-LM3 .unit-visual,
        .type-LM4 .unit-visual {
            background-size: 350% 500%;  /* 7/2 欄, 5列 */
            background-position: 40% 100%; /* 起始於第2欄 → 2/(7-2)*100% */
        }

        /* 戰鬥動畫 */
        @keyframes dynamic-strike {
            0% { transform: translate(0, 0) scale(1); z-index: 50; }
            15% { transform: translate(calc(var(--move-x) * -0.1), calc(var(--move-y) * -0.1)) scale(1.1); }
            35% { transform: translate(var(--move-x), var(--move-y)) scale(1.35); } 
            50% { transform: translate(var(--move-x), var(--move-y)) scale(1.35); } 
            70% { transform: translate(0, 0) scale(1); z-index: 1; }
            100% { transform: translate(0, 0) scale(1); }
        }
        .action-melee { animation: dynamic-strike var(--melee-duration) cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
        .hit-flash { background-color: rgba(255, 255, 255, 0.4) !important; }

        /* 血條與標籤 */
        .hp-bar-container { position: absolute; top: 2px; left: 2px; right: 2px; height: 4px; background: rgba(0,0,0,0.6); border-radius: 2px; overflow: hidden; z-index: 4; }
        .hp-bar { height: 100%; background: #55ff55; width: 100%; transition: width 0.15s ease; }
        .size-badge { position: absolute; bottom: 1px; right: 1px; font-size: 0.6rem; background: rgba(0,0,0,0.8); color: var(--accent-color); padding: 1px 3px; border-radius: 4px; font-weight: bold; z-index: 3; }

        /* 死亡與吸收 */
        .absorbed .unit-container, .dead .unit-container, .dead .hp-bar-container, .dead .size-badge { opacity: 0 !important; pointer-events: none; transition: opacity 0.2s; }
        .dead { background: #14141a !important; }

        button { width: 100%; padding: 12px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-spin { background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; box-shadow: 0 4px 15px rgba(255,153,0,0.3); }
        .btn-spin:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; box-shadow: none; }
        .save-bar { display: flex; gap: 8px; }
        .btn-save {
            flex: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 8px;
            background: linear-gradient(135deg, #2a2a35, #1a1a22);
            color: #eee;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-save:hover { background: #35353f; border-color: var(--accent-color); }
        .btn-save:active { transform: scale(0.97); }
        .log-panel { background: rgba(0,0,0,0.6); border-radius: 8px; height: 95px; padding: 8px 12px; font-size: 0.85rem; overflow-y: auto; line-height: 1.5; border-left: 4px solid var(--accent-color); }
        .log-melee { color: #ffcc00; font-weight: bold;}
        .log-win { color: #55ff55; font-weight: bold; }
        .log-lose { color: #ff5555; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🎰 完美容錯地下城</h1>
    <div class="status-board">
        <div>🧙‍♂️ LV: <span id="txt-lv">1</span></div>
        <div>💰 $ <span id="txt-coin">100</span></div>
        <div>👹 WAVE: <span id="txt-stage">1</span></div>
    </div>
    <div class="board-wrapper">
        <div class="board-corner">🔀</div>
        <div class="col-buttons" id="col-buttons"></div>
        <div class="row-buttons" id="row-buttons"></div>
        <div class="grid-container" id="grid-board"></div>
    </div>
    <button class="btn-spin" id="btn-spin">NEXT ROUND</button>
    <div class="log-panel" id="log-panel"><div>先按 NEXT ROUND 開新回合，再用左側／上方按鈕調整陣型，準備好後按 FIGHT 一路開戰到底！</div></div>
    <div class="save-bar">
        <button class="btn-save" id="btn-export" onclick="exportSave()">💾 匯出存檔</button>
        <button class="btn-save" id="btn-import" onclick="document.getElementById('import-file-input').click()">📂 匯入存檔</button>
        <input type="file" id="import-file-input" accept="application/json,.json" style="display:none" onchange="importSaveFile(event)">
    </div>
</div>

<script>
    // 建立完整的數據對照映射
    const MEMORY_MAP = {
        'H0': '🧙‍♂️', 'H1': '⚔️', 'H2': '🏹', 'H3': '🛡️', 'H4': '❤️',
        'M0': '👹', 'M1': '💀', 'M2': '🐉', 'M3': '👻', 'M4': '🎃'
    };

    const HERO_KEYS = ['H0', 'H1', 'H2', 'H3', 'H4'];
    const MONSTER_KEYS = ['M0', 'M1', 'M2', 'M3', 'M4'];
    
    let gameState = { lv: 1, coin: 100, stage: 1 };
    let isBattling = false;
    let activeUnits = [];
    let boardPhase = 'next'; // 'next' = 尚未開盤（按 NEXT 開新回合）；'fight' = 已開盤等待開戰
    let usedLines = new Set(); // 記錄本回合已經按過的直排/橫列按鈕（每回合每顆只能按一次）

    // 初始化網格
    const board = document.getElementById('grid-board');
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${i}`;
        
        const container = document.createElement('div');
        container.className = 'unit-container';
        container.id = `container-${i}`;

        const emojiSpan = document.createElement('span');
        emojiSpan.className = 'unit-emoji';
        emojiSpan.id = `emoji-${i}`;
        emojiSpan.innerText = '❓';

        const visual = document.createElement('div');
        visual.className = 'unit-visual';
        visual.id = `visual-${i}`;

        container.appendChild(emojiSpan);
        container.appendChild(visual);
        cell.appendChild(container);
        board.appendChild(cell);
    }

    // 建立直排（欄）與橫列（列）洗牌按鈕
    const colButtonsWrap = document.getElementById('col-buttons');
    const rowButtonsWrap = document.getElementById('row-buttons');
    for (let c = 0; c < 5; c++) {
        const btn = document.createElement('button');
        btn.className = 'line-btn';
        btn.id = `col-btn-${c}`;
        btn.innerText = '↓';
        btn.title = `重新洗牌第 ${c + 1} 直排`;
        btn.onclick = () => attemptReroll('col', c);
        colButtonsWrap.appendChild(btn);
    }
    for (let r = 0; r < 5; r++) {
        const btn = document.createElement('button');
        btn.className = 'line-btn';
        btn.id = `row-btn-${r}`;
        btn.innerText = '→';
        btn.title = `重新洗牌第 ${r + 1} 橫列`;
        btn.onclick = () => attemptReroll('row', r);
        rowButtonsWrap.appendChild(btn);
    }

    function setLineButtonsDisabled(disabled) {
        for (let i = 0; i < 5; i++) {
            document.getElementById(`col-btn-${i}`).disabled = disabled;
            document.getElementById(`row-btn-${i}`).disabled = disabled;
        }
    }

    function randomKeyFor(i) {
        const isHero = Math.random() > 0.5;
        const pool = isHero ? HERO_KEYS : MONSTER_KEYS;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 依目前已使用紀錄，刷新每顆直排/橫列按鈕的 disabled 狀態
    function refreshLineButtonsAvailability() {
        for (let i = 0; i < 5; i++) {
            document.getElementById(`col-btn-${i}`).disabled = usedLines.has(`col-${i}`);
            document.getElementById(`row-btn-${i}`).disabled = usedLines.has(`row-${i}`);
        }
    }

    // 嘗試觸發某個直排/橫列的洗牌：本回合內每顆按鈕只能成功觸發一次
    function attemptReroll(type, idx) {
        if (isBattling || boardPhase !== 'fight') return;
        const key = `${type}-${idx}`;
        if (usedLines.has(key)) return; // 本回合已經按過，不再作用

        usedLines.add(key);
        const indices = type === 'col'
            ? [0, 1, 2, 3, 4].map(r => r * 5 + idx)
            : [0, 1, 2, 3, 4].map(c => idx * 5 + c);
        rerollLine(indices);
    }

    // 讓指定的一組格子（一整排或一整列）做短暫的洗牌動畫後定格
    function rerollLine(indices) {
        setLineButtonsDisabled(true); // 動畫期間先全部鎖定，避免連點衝突
        let ticks = 0;
        const iv = setInterval(() => {
            indices.forEach(i => containerRender(i, randomKeyFor(i)));
            ticks++;
            if (ticks > 6) {
                clearInterval(iv);
                refreshLineButtonsAvailability(); // 動畫結束後，依「本回合已用過」名單恢復可用狀態
            }
        }, 55);
    }

    // 初始化／每回合結束後，讓整個棋盤重新隨機排列（供直排/橫列按鈕接續微調）
    function fillBoardRandom() {
        for (let i = 0; i < 25; i++) {
            containerRender(i, randomKeyFor(i));
        }
    }

    // 清除上一回合遺留的戰鬥狀態（血條、死亡、合體樣式），保留每格目前的英雄/怪獸型態
    function resetBoardVisualState() {
        for (let i = 0; i < 25; i++) {
            const cell = document.getElementById(`cell-${i}`);
            cell.className = 'cell';
            const badge = cell.querySelector('.size-badge');
            if (badge) badge.remove();
            const hp = cell.querySelector('.hp-bar-container');
            if (hp) hp.remove();
        }
    }

    // 按鈕狀態機：NEXT（開新回合、可調整陣型）⇄ FIGHT（鎖定陣型、一路開戰到底）
    function updateSpinButton() {
        const btn = document.getElementById('btn-spin');
        if (boardPhase === 'next') {
            btn.innerText = 'NEXT ROUND';
            btn.onclick = handleNext;
        } else {
            btn.innerText = 'FIGHT !!';
            btn.onclick = handleFight;
        }
    }

    function handleNext() {
        if (isBattling) return;
        resetBoardVisualState();
        fillBoardRandom();
        usedLines.clear(); // 新回合開始，重置每顆按鈕的「本回合已用過」紀錄
        refreshLineButtonsAvailability();
        boardPhase = 'fight';
        updateSpinButton();
        addLog('🎲 新回合已開盤！可用左側／上方按鈕調整陣型（每顆本回合限用一次），按 FIGHT 開戰！');
    }

    function handleFight() {
        if (isBattling || boardPhase !== 'fight') return;
        isBattling = true;
        setLineButtonsDisabled(true);
        document.getElementById('btn-spin').disabled = true;
        buildBattlefield();
    }

    function updateUI() {
        document.getElementById('txt-lv').innerText = gameState.lv;
        document.getElementById('txt-coin').innerText = gameState.coin;
        document.getElementById('txt-stage').innerText = gameState.stage;
    }

    function addLog(msg, className = '') {
        const lp = document.getElementById('log-panel');
        const line = document.createElement('div');
        if(className) line.className = className;
        line.innerText = msg;
        lp.appendChild(line);
        lp.scrollTop = lp.scrollHeight;
    }

    // ===== 存檔匯出／匯入 =====

    function getBoardSnapshot() {
        const board = [];
        for (let i = 0; i < 25; i++) {
            const container = document.getElementById(`container-${i}`);
            const currentClass = [...container.classList].find(cls => cls.startsWith('type-'));
            board.push(currentClass ? currentClass.replace('type-', '') : null);
        }
        return board;
    }

    function exportSave() {
        if (isBattling) {
            alert('戰鬥進行中無法匯出存檔，請等本回合結束後再匯出！');
            return;
        }
        const saveData = {
            version: 1,
            savedAt: new Date().toISOString(),
            gameState: { ...gameState },
            boardPhase: boardPhase,
            usedLines: Array.from(usedLines),
            board: getBoardSnapshot()
        };
        const json = JSON.stringify(saveData, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const ts = saveData.savedAt.replace(/[:.]/g, '-');
        const a = document.createElement('a');
        a.href = url;
        a.download = `rollingwar-save-${ts}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        addLog('💾 已匯出存檔！');
    }

    function importSaveFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (isBattling) {
            alert('戰鬥進行中無法匯入存檔，請等本回合結束後再匯入！');
            event.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                applySaveData(data);
                addLog('📂 已成功匯入存檔！');
            } catch (err) {
                alert('存檔檔案格式錯誤，無法讀取！\n' + err.message);
            } finally {
                event.target.value = ''; // 清空，允許之後重複選同一檔案
            }
        };
        reader.onerror = () => {
            alert('讀取檔案時發生錯誤！');
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function applySaveData(data) {
        if (!data || typeof data !== 'object' || !Array.isArray(data.board) || data.board.length !== 25) {
            throw new Error('存檔資料格式不正確（缺少有效的 board 陣列）');
        }

        // 還原玩家進度
        gameState = {
            lv: Number(data.gameState && data.gameState.lv) || 1,
            coin: Number(data.gameState && data.gameState.coin) || 0,
            stage: Number(data.gameState && data.gameState.stage) || 1
        };
        updateUI();

        // 還原棋盤格局（先清掉血條/死亡等戰鬥殘留樣式）
        resetBoardVisualState();
        data.board.forEach((key, i) => {
            containerRender(i, key || 'H0');
        });

        // 還原回合狀態，以及本回合已使用過的洗牌按鈕紀錄
        boardPhase = (data.boardPhase === 'fight') ? 'fight' : 'next';
        usedLines = new Set(Array.isArray(data.usedLines) ? data.usedLines : []);
        updateSpinButton();
        document.getElementById('btn-spin').disabled = false;

        if (boardPhase === 'fight') {
            refreshLineButtonsAvailability();
        } else {
            setLineButtonsDisabled(true);
        }
    }

    function containerRender(index, key) {
        const container = document.getElementById(`container-${index}`);
        const emojiSpan = document.getElementById(`emoji-${index}`);
        
        // 移除舊的型態 class
        container.className = 'unit-container';
        
        // 賦予新的型態 class (控制上層 CSS 圖片位置)
        container.classList.add(`type-${key}`);
        
        // 更改底層備援 Emoji 文字
        const baseKey = key.replace('L', ''); // 如果是大圖，取原來的 Emoji
        emojiSpan.innerText = MEMORY_MAP[baseKey] || '❓';
    }

    function buildBattlefield() {
        let matrix = [];
        activeUnits = [];
        
        for (let i = 0; i < 25; i++) {
            const container = document.getElementById(`container-${i}`);
            const currentClass = [...container.classList].find(cls => cls.startsWith('type-'));
            const currentKey = currentClass ? currentClass.replace('type-', '') : 'H0';
            const isHero = currentKey.startsWith('H');
            
            matrix.push({ id: i, row: Math.floor(i/5), col: i%5, type: isHero ? 'H' : 'M', key: currentKey, merged: false, size: 1 });
        }

        // 2x2 合併檢查
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                let idx = r * 5 + c;
                let cType = matrix[idx].type;
                if (!matrix[idx].merged && matrix[idx+1].type === cType && !matrix[idx+1].merged && matrix[idx+5].type === cType && !matrix[idx+5].merged && matrix[idx+6].type === cType && !matrix[idx+6].merged) {
                    matrix[idx].merged = true; 
                    matrix[idx+1].merged = true; matrix[idx+5].merged = true; matrix[idx+6].merged = true; 
                    matrix[idx].size = 4;
                }
            }
        }

        matrix.forEach((data, i) => {
            const cell = document.getElementById(`cell-${i}`);
            let maxHp = 50;
            let atk = 15;

            if (data.size > 1) {
                // 將渲染切換為巨大單位的圖片位置
                containerRender(i, 'L' + data.key);
                
                const badge = document.createElement('span');
                badge.className = 'size-badge';
                badge.innerText = `×4`;
                cell.appendChild(badge);
                maxHp = 200;
                atk = 45;
            } else if (data.merged) {
                cell.classList.add('absorbed');
                return;
            }

            const hpContainer = document.createElement('div');
            hpContainer.className = 'hp-bar-container';
            const hpBar = document.createElement('div');
            hpBar.className = 'hp-bar';
            hpContainer.appendChild(hpBar);
            cell.appendChild(hpContainer);

            activeUnits.push({
                id: i,
                cell: cell,
                container: document.getElementById(`container-${i}`),
                row: data.row,
                col: data.col,
                type: data.type,
                hp: maxHp,
                maxHp: maxHp,
                atk: atk,
                hpBar: hpBar
            });
        });

        addLog(`⚔️ 戰線部署完畢！至死方休亂鬥開打！`, 'log-melee');
        loopBattleRound();
    }

    function loopBattleRound() {
        const heroes = activeUnits.filter(u => u.type === 'H' && u.hp > 0);
        const monsters = activeUnits.filter(u => u.type === 'M' && u.hp > 0);

        if (heroes.length === 0 || monsters.length === 0) {
            endBattleAction(heroes.length, monsters.length);
            return;
        }

        activeUnits.forEach(u => u.container.classList.remove('action-melee'));

        activeUnits.forEach(unit => {
            if (unit.hp <= 0) return;
            const enemies = unit.type === 'H' ? monsters : heroes;
            if (enemies.length === 0) return;

            let target = enemies[0];
            let minDst = Infinity;
            enemies.forEach(e => {
                let dst = Math.pow(unit.row - e.row, 2) + Math.pow(unit.col - e.col, 2);
                if (dst < minDst) { minDst = dst; target = e; }
            });

            const myRect = unit.cell.getBoundingClientRect();
            const targetRect = target.cell.getBoundingClientRect();
            
            unit.container.style.setProperty('--move-x', `${targetRect.left - myRect.left}px`);
            unit.container.style.setProperty('--move-y', `${targetRect.top - myRect.top}px`);
            unit.container.style.setProperty('--melee-duration', `${0.35 + Math.random() * 0.15}s`);

            unit.container.classList.add('action-melee');

            setTimeout(() => {
                if (unit.hp <= 0 || target.hp <= 0) return;
                target.cell.classList.add('hit-flash');
                setTimeout(() => target.cell.classList.remove('hit-flash'), 60);

                let dmg = Math.floor(unit.atk * (0.8 + Math.random() * 0.4));
                target.hp = Math.max(0, target.hp - dmg);
                target.hpBar.style.width = `${(target.hp / target.maxHp) * 100}%`;

                if (target.hp <= 0) target.cell.classList.add('dead');
            }, 140);
        });

        setTimeout(() => {
            activeUnits = activeUnits.filter(u => u.hp > 0);
            loopBattleRound();
        }, 700);
    }

    function endBattleAction(heroCount, monsterCount) {
        document.querySelectorAll('.unit-container').forEach(c => c.classList.remove('action-melee'));
        if (heroCount > 0 && monsterCount === 0) {
            let winCoin = 15 + heroCount * 2;
            gameState.coin += winCoin;
            gameState.stage += 1;
            addLog(`🎉 勝利！殘存 ${heroCount} 個英雄單位，金幣 +${winCoin}`, 'log-win');
        } else {
            gameState.coin = Math.max(0, gameState.coin - 20);
            addLog(`😭 戰敗！我方全軍覆沒，扣除金幣 20。`, 'log-lose');
        }
        updateUI();
        isBattling = false;
        boardPhase = 'next';
        updateSpinButton();
        document.getElementById('btn-spin').disabled = false;
        setLineButtonsDisabled(true);
    }

    updateUI();
    fillBoardRandom();
    setLineButtonsDisabled(true);
    updateSpinButton();
</script>
</body>
</html>
